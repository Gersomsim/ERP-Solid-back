services:
  db:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - erp-solid-db:/var/lib/postgresql/data
    networks:
      - erp-solid

volumes:
  erp-solid-db:

networks:
  erp-solid:
    driver: bridge
